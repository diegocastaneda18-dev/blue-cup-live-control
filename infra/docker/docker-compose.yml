version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bluecup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bluecup
    ports:
      - "5432:5432"
    volumes:
      - bluecup_pgdata:/var/lib/postgresql/data

volumes:
  bluecup_pgdata: