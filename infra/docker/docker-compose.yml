version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bluecup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bluecup
    ports:
      - "5432:5432"
    volumes:
      - bluecup_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: bluecup-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bluecup_minio
      MINIO_ROOT_PASSWORD: bluecup_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bluecup_minio:/data

volumes:
  bluecup_pgdata:
  bluecup_minio: